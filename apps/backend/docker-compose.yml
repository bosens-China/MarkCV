services:
  postgres:
    image: postgres:16-alpine
    container_name: markcv-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: markcv
      POSTGRES_PASSWORD: markcv_dev_password
      POSTGRES_DB: markcv_dev
    ports:
      - '55439:5432'
    volumes:
      - markcv_postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U markcv -d markcv_dev']
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  markcv_postgres_data:
