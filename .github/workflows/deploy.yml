name: Build Push and Deploy

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dockerhub-publish
  cancel-in-progress: true

jobs:
  publish:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Backend Metadata
        id: backend_meta
        uses: docker/metadata-action@v5
        with:
          images: boses/markcv-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: true
          tags: ${{ steps.backend_meta.outputs.tags }}
          labels: ${{ steps.backend_meta.outputs.labels }}

      - name: Extract Frontend Metadata
        id: frontend_meta
        uses: docker/metadata-action@v5
        with:
          images: boses/markcv-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          push: true
          tags: ${{ steps.frontend_meta.outputs.tags }}
          labels: ${{ steps.frontend_meta.outputs.labels }}

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: publish
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image (Local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/backend/Dockerfile
          push: false
          tags: markcv-backend:latest
          outputs: type=docker,dest=/tmp/backend-image.tar

      - name: Build Frontend Image (Local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/frontend/Dockerfile
          push: false
          tags: markcv-frontend:latest
          outputs: type=docker,dest=/tmp/frontend-image.tar

      - name: Compress Images
        run: |
          gzip -c /tmp/backend-image.tar > ./backend-image.tar.gz
          gzip -c /tmp/frontend-image.tar > ./frontend-image.tar.gz
          ls -lh *.tar.gz

      - name: Upload Images to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          target: /tmp
          source: "backend-image.tar.gz,frontend-image.tar.gz"
          overwrite: true

      - name: Load Images and Restart Containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script_stop: true
          script: |
            set -e
            # 解压并加载镜像
            gunzip -c /tmp/backend-image.tar.gz > /tmp/backend-image.tar
            gunzip -c /tmp/frontend-image.tar.gz > /tmp/frontend-image.tar
            docker load -i /tmp/backend-image.tar
            docker load -i /tmp/frontend-image.tar
            rm -f /tmp/backend-image.tar.gz /tmp/frontend-image.tar.gz /tmp/backend-image.tar /tmp/frontend-image.tar
            
            # 启动服务
            cd /data/docker_data/MarkCV
            docker compose up -d
            docker image prune -f
